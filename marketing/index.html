    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="IDENTIFYNG Technologies Co. Ltd — a leading Nigerian technology and innovation company delivering digital identity, government technology, augmented reality media, software engineering, and digital transformation solutions."
    />
    <meta name="theme-color" content="#070A14" />

      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify's build bot detects and provisions the contact form.
         The visible form is rendered by React with matching name/fields. -->
    <form name="contact" netlify-honeypot="bot-field" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="organization" />
      <select name="interest"></select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
